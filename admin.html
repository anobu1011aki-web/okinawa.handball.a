<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【管理画面】お知らせ投稿 | 沖縄県ハンドボール協会</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

  <header class="bg-[#1e1e1e] text-white shadow-md">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2 font-bold">
        <i data-lucide="settings" class="w-5 h-5 text-gray-400"></i>
        <span>沖縄県ハンドボール協会 運用管理システム</span>
      </div>
      <a href="index.html" target="_blank" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded transition flex items-center gap-1">
        公開ページを確認 <i data-lucide="external-link" class="w-3 h-3"></i>
      </a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
      <i data-lucide="edit" class="w-6 h-6 text-blue-600"></i> 新規お知らせの投稿
    </h2>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
      <div id="connection-status" class="mb-6 p-3 rounded bg-gray-50 text-xs text-gray-500 flex items-center gap-2">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
        </span>
        システム接続中...
      </div>

      <form id="post-form" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">投稿日・大会日</label>
            <input type="date" id="date" required class="w-full border border-gray-300 p-3 rounded-md outline-none focus:ring-2 focus:ring-blue-200">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">カテゴリー</label>
            <select id="category" required class="w-full border border-gray-300 p-3 rounded-md bg-white">
              <option value="お知らせ">お知らせ</option>
              <option value="大会結果">大会結果</option>
              <option value="小学生">小学生</option>
              <option value="中学生">中学生</option>
              <option value="高校生">高校生</option>
              <option value="一般・大学">一般・大学</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">内容</label>
          <textarea id="title" required rows="3" placeholder="例：〇〇大会で興南高校が優勝しました！" class="w-full border border-gray-300 p-3 rounded-md resize-none outline-none focus:ring-2 focus:ring-blue-200"></textarea>
        </div>

        <!-- PDF/資料URL入力欄を追加 -->
        <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
          <label class="block text-sm font-bold text-blue-800 mb-2 flex items-center gap-1">
            <i data-lucide="link" class="w-4 h-4"></i> PDF・資料のURL (任意)
          </label>
          <input type="url" id="fileUrl" placeholder="https://drive.google.com/... などのリンクを貼り付け" class="w-full border border-blue-200 p-3 rounded-md outline-none focus:ring-2 focus:ring-blue-400">
          <p class="text-[10px] text-blue-600 mt-2">
            ※Googleドライブや新聞社の記事URLを貼り付けると、公開ページに「PDF/リンク」ボタンが表示されます。
          </p>
        </div>

        <div class="pt-4 border-t border-gray-100 flex justify-end">
          <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition disabled:bg-gray-400">
            サイトに公開する
          </button>
        </div>
      </form>
      <div id="status-message" class="hidden mt-4 p-4 rounded-md font-bold text-center"></div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrv64pi_fxsRLZjh5oX3jZIlD2dWGQPFs",
      authDomain: "okinawa-handball.firebaseapp.com",
      projectId: "okinawa-handball",
      storageBucket: "okinawa-handball.firebasestorage.app",
      messagingSenderId: "672118967740",
      appId: "1:672118967740:web:b55537a9c68fcf1acaefb9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'okinawa-handball-prod';

    const statusEl = document.getElementById('connection-status');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        statusEl.innerHTML = '<span class="text-green-600 font-bold">✅ システム接続完了（投稿可能です）</span>';
      } else {
        signInAnonymously(auth).catch(e => {
          statusEl.innerHTML = `<span class="text-red-600 font-bold">❌ 接続エラー: ${e.message}</span><br>FirebaseのAuthenticationで「匿名」をオンにしてください。`;
        });
      }
    });

    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const statusMsg = document.getElementById('status-message');
      
      const fileUrl = document.getElementById('fileUrl').value;
      const data = {
        date: document.getElementById('date').value,
        category: document.getElementById('category').value,
        title: document.getElementById('title').value,
        fileUrl: fileUrl || "",
        hasFile: fileUrl ? true : false
      };

      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const newsRef = collection(db, 'artifacts', appId, 'public', 'data', 'news');
        await addDoc(newsRef, data);
        statusMsg.textContent = "✅ 投稿が完了しました！";
        statusMsg.className = "mt-4 p-4 rounded-md font-bold text-center bg-green-100 text-green-700 block";
        document.getElementById('post-form').reset();
      } catch (error) {
        statusMsg.textContent = "❌ エラー: " + error.message;
        statusMsg.className = "mt-4 p-4 rounded-md font-bold text-center bg-red-100 text-red-700 block";
      } finally {
        btn.disabled = false;
        btn.textContent = 'サイトに公開する';
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
